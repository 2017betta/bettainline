<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betta Inline Skate Club</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background-color:#add8e6; /* 淡藍色背景 */
  color:black;
}
.container{position:relative; z-index:2;}
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#0096c7; /* 深藍色標題欄 */
  color:white;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
.section{
  padding:60px 20px;
  text-align:center;
}
.gallery img{
  width:260px;
  margin:12px;
  border-radius:12px;
}
.login-box{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:30px;
  border-radius:15px;
  z-index:5;
}
input{
  display:block;
  width:220px;
  margin:10px 0;
  padding:8px;
}
.transparent-logo{
  max-width:80%;
  height:auto;
  opacity:1; /* Logo 100% */
  margin:25px auto;
  display:block;
  border-radius:12px;
}
</style>
</head>

<body>
<div class="container">

<header>
  <h2>Betta Inline Skate Club</h2>
  <button onclick="showLogin()">登入</button>
</header>

<!-- 首頁左右排列區 -->
<div class="section" style="display:flex; flex-wrap:wrap; align-items:center; justify-content:center;">
  
  <!-- 左邊文字區（置中） -->
  <div style="flex:1; min-width:250px; padding:20px; text-align:center;">
    <h1>鬥魚直排輪俱樂部</h1>
    <p style="font-size:18px; margin-top:10px;">
      專業直排輪教學｜競速訓練｜活動推廣
    </p>
  </div>

  <!-- 右邊 Logo 區 -->
  <div style="flex:1; min-width:250px; padding:20px; text-align:center;">
    <img src="https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/489273120_1158160336323914_4604643340299191214_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=2a1932&_nc_ohc=4tb2Q1eRKiMQ7kNvwExyLxP&_nc_oc=AdojpYWHiGp8sWkLYtxKTPltRg-64wxWt0Prsbs_LRuYQcVpIq-j6nBmTHyCfDM-z1o&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=Cw4JR0LFozvt3FdCpuXkjA&_nc_ss=7a32e&oh=00_Afz5DPyVYjNyr1Rvy4DZi1jPeTCc09lLppYbosjIn9eaNw&oe=69C88C7A"
         class="transparent-logo">
  </div>

</div>

<!-- 活動照片區 -->
<div class="section" style="background:#90e0ef;">
  <h2>近期活動照片</h2>
  <div class="gallery">
    <img src="https://picsum.photos/300/200?1">
    <img src="https://picsum.photos/300/200?2">
    <img src="https://picsum.photos/300/200?3">
  </div>
</div>

<!-- FB 粉專按鈕 -->
<div class="section">
  <h2>官方粉絲專頁</h2>
  <a href="https://www.facebook.com/BettaInlineSkateClub" target="_blank">
    <button style="background:#0077b6;color:white;">前往FB</button>
  </a>
</div>

</div>

<!-- 登入視窗 -->
<div class="login-box" id="loginBox">
  <h3>會員登入</h3>
  <input type="text" id="user" placeholder="帳號">
  <input type="password" id="pass" placeholder="密碼">
  <button onclick="login()">登入</button>
  <button onclick="closeLogin()">取消</button>
</div>

<script>
function showLogin(){
  document.getElementById("loginBox").style.display="block";
}
function closeLogin(){
  document.getElementById("loginBox").style.display="none";
}
function login(){
  var u=document.getElementById("user").value;
  var p=document.getElementById("pass").value;

  if(u=="admin" && p=="1234"){
    alert("管理員 "+u+" 歡迎登入");
    window.location.href="admin.html";
  }
  else if(u=="coach" && p=="5678"){
    alert("教練 "+u+" 歡迎登入");
    window.location.href="staff.html";
  }
  else{
    alert("帳號或密碼錯誤");
  }
}
</script>

</body>
</html>
